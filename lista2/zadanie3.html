<!DOCTYPE html>
<html>
    <head>
        <title>Zadanie 3</title>
        <link rel="stylesheet" href="bootstrap.min.css">
        <link rel="stylesheet" href="style3.css">
    </head>
    <body>
        <div class="container container-app">
            <div class="row">
                <div class="col-md-4">
                    <h4>Notes</h4>
                    <ul id="notesList" class="list-group notes-list"></ul>
                    <div class="mt-3">
                        <button class="btn btn-secondary btn-sm" id="exportBtn">Export JSON</button>
                        <input type="file" id="importFile" class="form-control mt-2">
                    </div>
                </div>
                <div class="col-md-8">
                    <h4>Note editor</h4>
                    <form id="noteForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            <textarea id="content" class="form-control" rows="8"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </form>
                </div>
            </div>
        </div>
        <script src="script3.js"></script>
    </body>
</html>
