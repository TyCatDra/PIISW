<!DOCTYPE html>
<html>
    <head>
        <title>Zadanie 1</title>
        <style>
            body{
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            #slider{
                -webkit-appearance: none;
                width: 400px;
                height: 8px;
                margin-bottom: 40px;
                border-radius: 10px;
                background: linear-gradient(to right, #5a00ff 50%, #d3d3d3 50%);
                outline: none;
                transition: background 0.2s ease;
            }
            #slider::-webkit-slider-thumb{
                -webkit-appearance: none;
                width: 22px;
                height: 22px;
                border-radius: 50%;
                background: #5a00ff;
                cursor: pointer;
                box-shadow: 0 0 5px rgba(0,0,0,0.2);
            }
            #circle{
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                border: 4px solid #5a00ff;
                color: black;
                background-color: #caed8f;
                transition: 
                    width 0.2s ease,
                    height 0.2s ease,
                    background 0.2 ease
            }
        </style>
    </head>

    <body>
        <input id="slider" type="range" min="10" max="500" value="100">
        <div id="circle">100 px</div>
        <script>
            const slider = document.getElementById("slider");
            const circle = document.getElementById("circle");
            function updateCircle(value){
                circle.style.width = value + "px";
                circle.style.height = value + "px";
                circle.textContent = value + " px";
                const lightness = 40 + ((value-10) / 490) * 45;
                circle.style.backgroundColor = `hsl(60, 100%, ${lightness}%)`
            }
            function updateSlider(){
                const min = slider.min;
                const max = slider.max;
                const val = slider.value;
                const percent = (val - min) / (max - min) * 100;
                slider.style.background =
                    `linear-gradient(to right, #5a00ff ${percent}%, #d3d3d3 ${percent}%)`;
            }
            slider.addEventListener("input", () => {
                updateCircle(slider.value);
                updateSlider();
            });
            document.addEventListener("keydown", (e) => {
                let value = parseInt(slider.value);
                if(e.key === "ArrowRight"){
                    value = Math.min(500, value + 10);
                }
                if(e.key === "ArrowLeft"){
                    value = Math.max(10, value - 10);
                }
                slider.value = value;
                updateCircle(value);
            });
            updateCircle(slider.value);
            updateSlider();
        </script>
    </body>
</html>
