<!DOCTYPE html>
<html>
    <head>
        <title>Zadanie 2</title>
        <link rel="stylesheet" href="bootstrap.min.css">
        <link rel="stylesheet" href="style2.css">
    </head>
    <body>
        <div class="container-box">
            <h2>Please enter package and dimensions</h2>
            <form id="packageForm" class="mt-3">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" id="name" class="form-control" maxlength="20" required>
                    <div class="invalid-feedback">
                    Name is required (max 20 characters)</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Width</label>
                    <div class="input-group">
                        <input type="number" id="width" class="form-control" min="1" max="1000" required>
                        <span class="input-group-text">cm</span>
                        <div class="invalid-feedback">
                        Value must be between 1 and 1000</div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Height</label>
                    <div class="input-group">
                        <input type="number" id="height" class="form-control" min="1" max="1000" required>
                        <span class="input-group-text">cm</span>
                        <div class="invalid-feedback">
                        Value must be between 1 and 1000</div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Depth</label>
                    <div class="input-group">
                        <input type="number" id="depth" class="form-control" min="1" max="1000" required>
                        <span class="input-group-text">cm</span>
                        <div class="invalid-feedback">
                        Value must be between 1 and 1000</div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Confirm</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </form>
            <hr>
            <h3>Packages</h3>
            <div class="mb-3">
                <input type="text" id="search" class="form-control" placeholder="Search packages...">
            </div>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Width (cm)</th>
                        <th>Height (cm)</th>
                        <th>Depth (cm)</th>
                        <th>Volume (m^3)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="4" class="text-end">Total volume</td>
                        <td id="totalVolume">0.00</td>
                    </tr>
                </tfoot>
            </table>
        </div>
        <script src="script2.js"></script>
    </body>
</html>
